name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Cancel stale runs on PRs; always let master finish.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to least-privilege; individual jobs can add more if needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace --all-targets --all-features -- -D warnings
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - name: Install JS dependencies
        run: npm ci
      - name: cargo test --workspace --all-features
        # The teleport-build snapshot test requires `tsc` and hard-fails
        # if it's missing. `npm ci` above guarantees it's present.
        run: cargo test --workspace --all-features
      - name: cargo package publishable crates
        run: ./scripts/package-publishable-crates.sh

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc (warnings as errors)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps

  msrv:
    name: msrv (Rust 1.93)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check against declared MSRV
        run: cargo check --workspace --all-features

  typescript:
    name: typescript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install JS dependencies
        run: npm ci
      - name: Type-check @teleport-rs/client
        working-directory: packages/client
        run: npm exec tsc --noEmit -p tsconfig.json
      - name: Type-check @teleport-rs/vite
        working-directory: packages/vite
        run: npm exec tsc --noEmit -p tsconfig.json
      - name: Run @teleport-rs/client unit tests
        run: npm run test -w @teleport-rs/client
      - name: Run @teleport-rs/vite unit tests
        run: npm run test -w @teleport-rs/vite
      - name: Pack JS packages
        run: npm pack -w @teleport-rs/client --dry-run && npm pack -w @teleport-rs/vite --dry-run

  demo_frontend:
    name: demo frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - name: Install JS dependencies
        run: npm ci
      - name: Build local JS packages
        run: npm run build:js
      - name: Export demo frontend bindings
        run: npm run demo:export
      - name: Check demo frontend
        run: npm run check -w examples/demo/frontend
      - name: Build demo frontend
        run: npm run build -w examples/demo/frontend

  dotnet:
    name: dotnet
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: dotnet restore
        run: dotnet restore dotnet/Teleport.Net.sln
      - name: dotnet build
        run: dotnet build dotnet/Teleport.Net.sln -c Release --no-restore
      - name: dotnet test
        run: dotnet test dotnet/Teleport.Net.sln -c Release --no-build
      - name: dotnet pack Teleport.Net
        run: dotnet pack dotnet/src/Teleport.Net/Teleport.Net.csproj -c Release --no-build --output /tmp/teleport-nuget
      - name: dotnet pack Teleport.Net.AspNetCore
        run: dotnet pack dotnet/src/Teleport.Net.AspNetCore/Teleport.Net.AspNetCore.csproj -c Release --no-build --output /tmp/teleport-nuget

  demo_frontend_dotnet:
    name: demo frontend (.NET)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: Swatinem/rust-cache@v2
      - name: Install JS dependencies
        run: npm ci
      - name: Build local JS packages
        run: npm run build:js
      - name: Build .NET solution
        run: dotnet build dotnet/Teleport.Net.sln -c Release
      - name: Export demo frontend bindings from .NET
        run: npm run demo:export:dotnet
      - name: Check demo frontend
        run: npm run check -w examples/demo/frontend
      - name: Build demo frontend
        run: npm run build -w examples/demo/frontend

  go:
    name: go
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: Swatinem/rust-cache@v2
      - name: go test
        run: cd go && CGO_ENABLED=0 go test ./...
      - name: go vet
        run: cd go && CGO_ENABLED=0 go vet ./...
      - name: Export Go demo contract
        run: cd go && CGO_ENABLED=0 go run ./examples/demo --export-only
      - name: Validate Go contract via shared TS generator
        run: cargo run -p teleport-cli -- generate-ts --input go/examples/demo/teleport.contract.json --output /tmp/teleport-go-bindings

  demo_frontend_go:
    name: demo frontend (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: Swatinem/rust-cache@v2
      - name: Install JS dependencies
        run: npm ci
      - name: Build local JS packages
        run: npm run build:js
      - name: Build Go implementation
        run: npm run go:build
      - name: Export demo frontend bindings from Go
        run: npm run demo:export:go
      - name: Check demo frontend
        run: npm run check -w examples/demo/frontend
      - name: Build demo frontend
        run: npm run build -w examples/demo/frontend

  contract_parity:
    name: contract parity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: Swatinem/rust-cache@v2
      - name: Install JS dependencies
        run: npm ci
      - name: Export Rust demo contract
        run: npm run demo:export
      - name: Export .NET demo contract
        run: npm run demo:export:dotnet
      - name: Export Go demo contract
        run: cd go && CGO_ENABLED=0 go run ./examples/demo --export-only
      - name: Compare contracts
        run: npm run contracts:parity

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny --all-features check

  # Status gate for branch protection: require this single job to succeed
  # in the repo settings, and it will transitively require every job above.
  ci:
    name: ci
    runs-on: ubuntu-latest
    if: always()
    needs:
      - fmt
      - clippy
      - test
      - docs
      - msrv
      - typescript
      - demo_frontend
      - dotnet
      - go
      - demo_frontend_dotnet
      - demo_frontend_go
      - contract_parity
      - deny
    steps:
      - name: Check all jobs succeeded
        run: |
          jobs='${{ toJSON(needs) }}'
          echo "$jobs"
          echo "$jobs" | jq -e 'to_entries | all(.value.result == "success")' > /dev/null
